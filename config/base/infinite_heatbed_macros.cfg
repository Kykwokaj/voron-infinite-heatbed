##########################################################
# Voron Infinite Heatbed - Core GCode Macros
# READ-ONLY: Do not edit this file directly.
# Override hook macros in config/optional/client_macros.cfg
##########################################################

# ── Slicer Interface ─────────────────────────────────────

[gcode_macro HEATBED_PRINT_START]
description: Call from slicer Start GCode. Records print length for ejection.
gcode:
    {% set print_length = params.PRINT_LENGTH | default(0) | float %}
    {% if print_length <= 0 %}
        { action_raise_error("HEATBED_PRINT_START: PRINT_LENGTH must be > 0") }
    {% endif %}
    SAVE_VARIABLE VARIABLE=ihb_print_length VALUE={ print_length }
    SET_GCODE_VARIABLE MACRO=_IHB_STATE VARIABLE=print_length VALUE={ print_length }
    { action_respond_info("IHB: Print started. Belt will eject %dmm." % (print_length | int)) }
    _IHB_ON_PRINT_START

[gcode_macro HEATBED_PRINT_END]
description: Call from slicer End GCode. Triggers full eject sequence (HEATBED_EJECT is a Python command).
gcode:
    _IHB_ON_PRINT_END
    HEATBED_EJECT

# ── Manual Commands ──────────────────────────────────────
# Note: HEATBED_STATUS and HEATBED_EJECT are registered by the Python module
#       to provide proper state management.

[gcode_macro HEATBED_SET_SPEED]
description: Override belt speed for testing.
gcode:
    {% set speed = params.SPEED | float %}
    SET_GCODE_VARIABLE MACRO=_IHB_PARAMS VARIABLE=belt_speed VALUE={ speed }
    { action_respond_info("IHB: Belt speed set to %.1f mm/s" % speed) }

[gcode_macro HEATBED_OPEN_DOOR]
description: Manually open the printer door.
gcode:
    SET_GCODE_VARIABLE MACRO=_IHB_STATE VARIABLE=door_state VALUE='"open"'
    _IHB_DOOR_OPEN_IMPL
    { action_respond_info("IHB: Door opened.") }

[gcode_macro HEATBED_CLOSE_DOOR]
description: Manually close the printer door.
gcode:
    _IHB_DOOR_CLOSE_IMPL
    SET_GCODE_VARIABLE MACRO=_IHB_STATE VARIABLE=door_state VALUE='"closed"'
    { action_respond_info("IHB: Door closed.") }

# ── Internal State ───────────────────────────────────────

[gcode_macro _IHB_STATE]
# Internal state variables — do not call directly.
variable_state:            "idle"       # idle | printing | ejecting | door_open | error
variable_print_length:     0.0          # mm, set by HEATBED_PRINT_START
variable_belt_odometer_mm: 0.0          # total mm traveled (maintenance tracking)
variable_door_state:       "closed"     # open | closed
gcode:
    # Not called directly.

# ── Door Implementation Stubs ────────────────────────────
# These are overridden in client_macros.cfg based on door_type.

[gcode_macro _IHB_DOOR_OPEN_IMPL]
gcode:
    # Placeholder — override in client_macros.cfg for your door type.
    # Example for servo:
    #   SET_SERVO SERVO=infinite_heatbed_door_servo ANGLE=90
    # Example for solenoid:
    #   SET_PIN PIN=infinite_heatbed_door_solenoid VALUE=1

[gcode_macro _IHB_DOOR_CLOSE_IMPL]
gcode:
    # Placeholder — override in client_macros.cfg for your door type.
    # Example for servo:
    #   SET_SERVO SERVO=infinite_heatbed_door_servo ANGLE=0
    # Example for solenoid:
    #   SET_PIN PIN=infinite_heatbed_door_solenoid VALUE=0

# ── User Hook Stubs ──────────────────────────────────────
# Override these in client_macros.cfg to add custom behavior.

[gcode_macro _IHB_ON_PRINT_START]
gcode:
    # Called after HEATBED_PRINT_START. Add custom pre-print actions here.

[gcode_macro _IHB_ON_PRINT_END]
gcode:
    # Called at the start of HEATBED_PRINT_END, before ejection.

[gcode_macro _IHB_ON_EJECT_COMPLETE]
gcode:
    # Called after ejection completes and door is closed.
    # Default: do nothing (next print starts via Moonraker job queue from the Python side).
