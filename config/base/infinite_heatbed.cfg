##########################################################
# Voron Infinite Heatbed - Hardware Configuration
# READ-ONLY: Do not edit this file directly.
# Override pins in your printer.cfg after the [include].
##########################################################

[infinite_heatbed]
motor_count: 1              # 1 or 2
ejection_sensor: tof        # tof | camera | both | none
door_type: none             # servo | solenoid | stepper | none
belt_speed: 50              # mm/s during ejection
eject_margin_mm: 20         # extra belt travel after sensor clears
eject_timeout_s: 60         # abort eject after this many seconds
tof_threshold_mm: 50        # TOF distance (mm) considered "object present"

# ── Motor 1 (always required) ────────────────────────────
# Replace pins with your MCU's actual stepper driver pins.
[manual_stepper infinite_heatbed_motor1]
step_pin: PE2
dir_pin: PE3
enable_pin: !PE4
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 200
velocity: 50
accel: 200
# No endstop_pin — belt is continuous, no home position

# ── Motor 2 (only if motor_count: 2) ────────────────────
# Uncomment and configure if using dual-motor drive.
#[manual_stepper infinite_heatbed_motor2]
#step_pin: PE6
#dir_pin: PA14
#enable_pin: !PE0
#rotation_distance: 40
#microsteps: 16
#full_steps_per_rotation: 200
#velocity: 50
#accel: 200

# ── Stepper Driver Config ────────────────────────────────
# Uncomment and configure based on your driver type.
# Replace pins/settings with your actual values.

# TMC2240 (SPI-based driver)
#[tmc2240 manual_stepper infinite_heatbed_motor1]
#cs_pin: PE3
#spi_software_sclk_pin: PG8
#spi_software_mosi_pin: PG6
#spi_software_miso_pin: PG7
#run_current: 0.8
#hold_current: 0.400

# TMC2209 (UART-based driver)
#[tmc2209 manual_stepper infinite_heatbed_motor1]
#uart_pin: PE3
#run_current: 0.8
#hold_current: 0.400

# For motor2 (if using dual motors):
#[tmc2240 manual_stepper infinite_heatbed_motor2]
#cs_pin: PA15
#spi_software_sclk_pin: PG8
#spi_software_mosi_pin: PG6
#spi_software_miso_pin: PG7
#run_current: 0.8
#hold_current: 0.400

# ── TOF Sensor (only if ejection_sensor includes tof) ───
# VL53L0X via I2C. Adjust i2c_bus to match your wiring.
# NOTE: Klipper has no native VL53L0X driver.
# See README "Pattern 4" for the RP2040 co-processor approach.
# The sensor value is surfaced as a temperature-like sensor:
#[temperature_sensor infinite_heatbed_tof]
#sensor_type: temperature_host
#sensor_path: /tmp/ihb_tof_reading

# ── Door Servo (only if door_type: servo) ───────────────
#[servo infinite_heatbed_door_servo]
#pin: PB6
#maximum_servo_angle: 180
#minimum_pulse_width: 0.001
#maximum_pulse_width: 0.002
#initial_angle: 0

# ── Door Solenoid (only if door_type: solenoid) ─────────
#[output_pin infinite_heatbed_door_solenoid]
#pin: PB7
#value: 0
#shutdown_value: 0
