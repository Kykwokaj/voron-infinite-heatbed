##########################################################
# Voron Infinite Heatbed - Tuning Parameters
# Edit these values to tune behavior for your machine.
##########################################################

[gcode_macro _IHB_PARAMS]
# Belt ejection speed (mm/s). Increase for faster cycle, decrease if belt slips.
variable_belt_speed:            50
# Extra belt travel (mm) after sensor clears. Ensures print fully exits.
variable_eject_margin_mm:       20
# Eject timeout (s). If belt runs longer, sequence aborts with error.
variable_eject_timeout_s:       60
# TOF distance threshold (mm). Readings below this = object detected.
variable_tof_threshold_mm:      50
# Delay (ms) after door opens before belt starts moving.
variable_door_open_delay_ms:    500
# Delay (ms) after belt stops before door closes.
variable_door_close_delay_ms:   500
# Camera snapshot URL (crowsnest default).
variable_camera_snapshot_url:   "http://localhost/webcam/?action=snapshot"
# Belt odometer warning (mm). Alert when belt has traveled this far (maintenance).
variable_belt_maintenance_mm:   100000
gcode:
    # This macro exists only to store variables — not called directly.
