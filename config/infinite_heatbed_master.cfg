##########################################################
# Voron Infinite Heatbed - Master Configuration
# This file includes all sub-configs in the correct order.
#
# Add to printer.cfg:
#   [include ihb/infinite_heatbed_master.cfg]
##########################################################

# 1. Hardware configuration (pins, stepper definitions)
[include ihb/base/infinite_heatbed.cfg]

# 2. Tuning parameters (speeds, margins, timeouts)
[include ihb/base/infinite_heatbed_params.cfg]

# 3. Core GCode macros (READ-ONLY)
[include ihb/base/infinite_heatbed_macros.cfg]

# 4. User-customizable macros (door implementation, custom hooks)
[include ihb/optional/client_macros.cfg]
