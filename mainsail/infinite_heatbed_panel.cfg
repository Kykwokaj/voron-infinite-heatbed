##########################################################
# Voron Infinite Heatbed - Mainsail / Fluidd Panel Config
# Add to moonraker.conf via:
#   [include ~/voron-infinite-heatbed/mainsail/infinite_heatbed_panel.cfg]
##########################################################

# Expose the heatbed module to Mainsail/Fluidd via Moonraker's object query.
# Mainsail reads printer objects listed here for its "Additional Sensors" panel.
[status_store]
# Nothing to configure here — the panel reads from the REST endpoint:
#   GET /machine/infinite_heatbed/status
# Mainsail displays values returned by that endpoint in the dashboard.

# OTA update registration — allows Mainsail's update panel to manage this mod.
[update_manager infinite_heatbed]
type: git_repo
path: ~/voron-infinite-heatbed
origin: https://github.com/YOUR_USERNAME/voron-infinite-heatbed.git
primary_branch: main
managed_services: klipper moonraker
